<head>
    <meta charset="UTF-8">
    <title>MyNutritionTracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Top header -->
    <header>
        <button class="menu-btn" id="menu-btn">Menu</button>
        <h1>MyNutritionTracker</h1>
    </header>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <button class="close-btn" id="close-btn">&times;</button>
        <a href="index.html">Home</a>
        <a href="registration.html">Registration</a>
        <a href="login.html">Login</a>
        <a href="dashboard.html">Dashboard</a>
    </nav>



<section class="register-form-container">
    <h2>Create Your Account</h2>
    <form action="registration.html" method="post">

        <!-- Full Name -->
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>

        <!-- Email -->
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="john@example.com" required>

        <!-- Password -->
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="*********" required>

        <!-- Age and Height side by side -->
        <div class="row">
            <div class="half">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" placeholder="25" required>
            </div>
            <div class="half">
                <label for="height">Height (cm)</label>
                <input type="number" id="height" name="height" placeholder="175" required>
            </div>
        </div>

        <!-- Weight -->
        <label for="weight">Weight (kg)</label>
        <input type="number" id="weight" name="weight" placeholder="70" required>

        <!-- Create Account Button -->
        <button type="submit" class="btn create-btn">Create Account</button>

        <!-- Login link -->
        <p class="login-link">Already have an account? <a href="login.html">Login</a></p>
    </form>
</section>


<!--Menu Button-->
<script>
    const menuBtn = document.getElementById('menu-btn');
    const sidebar = document.getElementById('sidebar');
    const closeBtn = document.getElementById('close-btn');
    const overlay = document.getElementById('overlay');

    menuBtn.addEventListener('click', () => {
        sidebar.classList.add('active');
        overlay.classList.add('active');
    });

    closeBtn.addEventListener('click', () => {
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
    });

    overlay.addEventListener('click', () => {
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
    });
</script>
